name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feature/photo-check]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          sed -i "s|__GEMINI_API_KEY__|${{ secrets.GEMINI_API_KEY }}|g" index.html
          sed -i "s|__ELEVENLABS_API_KEY__|${{ secrets.ELEVENLABS_API_KEY }}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          # main → root (/homework), feature branches → subdir (/homework/photo-check)
          destination_dir: ${{ github.ref == 'refs/heads/main' && '.' || 'photo-check' }}
          keep_files: true  # don't delete other deployments
